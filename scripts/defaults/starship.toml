# Default starship config bundled with the cockpit plugin.
#
# cship's [starship_prompt] hook spawns the starship binary with
# STARSHIP_CONFIG=~/.config/starship.toml whenever $starship_prompt appears
# in cship.toml's `format`. That delegation is the only way to render
# starship-flavored [custom.*] modules — cship's own line renderer does not
# evaluate [custom.*] sections.
#
# Copied to ~/.config/starship.toml only when you run `cockpit --footer`
# (the explicit footer-setup command). --once / --watch reconcile cycles
# never touch this file, so any edits you make stick around until you
# re-run --footer.

# Explicit two-line layout:
#   line 1 = session state (context / rate / session / model / mode / branch / commit age)
#   line 2 = PR/Linear identity (ticket / state / num / checks / title)
#
# Line 2 collapses entirely when there's no Linear ticket and no PR for the
# current branch — the trailing newline still prints, but cship trims
# blank trailing lines, so the footer stays single-line in that case.
#
# `${custom.<name>}` (braces required) is starship's syntax for referencing
# a specific [custom.*] block. Bare `$custom` would expand to every custom
# module concatenated in arbitrary order; the dotted form is what lets us
# pin the line break between commit_age and linear.
format = """\
${custom.context}\
${custom.session_time}\
${custom.ratelimit}\
${custom.model}\
${custom.permission_mode}\
${custom.branch_pill}\
${custom.commit_age}
${custom.linear}\
${custom.pr_state}\
${custom.pr_num}\
${custom.pr_checks}\
${custom.pr_title}"""

add_newline = false

# Disable starship's default modules so the format above is authoritative:
# `format` listing only `${custom.*}` would normally still render the prefix
# the host shell's starship default appends, which we don't want here.
[character]
disabled = true

# All [custom.*] commands invoke the bundled `scripts/cship.py` dispatcher.
# The literal `__COCKPIT_STARSHIP__` token is replaced with the resolved absolute
# path at install time by `install_starship_default_config()` in
# scripts/lib/config.py — starship spawns commands without changing cwd, so
# the path baked into ~/.config/starship.toml must be absolute.

# Claude Code context usage (e.g. "4%/1M"); ceiling cached by cship.py wrapper from display_name.
[custom.context]
command     = "__COCKPIT_STARSHIP__ context"
when        = "true"
format      = "( [🧠 $output]($style))"
style       = "fg:#475569"
description = "Claude Code context window usage"

# Claude Code session duration (e.g. "1h 23m"); cship.py wrapper stashes transcript path each render.
[custom.session_time]
command     = "__COCKPIT_STARSHIP__ session-time"
when        = "true"
format      = "( [⏱ $output]($style))"
style       = "fg:#475569"
description = "Claude Code session duration"

# Rolling 5-hour usage limit, read from JSON Claude Code passes (cship's own usage_limits is broken).
[custom.ratelimit]
command     = "__COCKPIT_STARSHIP__ rate-limit"
when        = "true"
format      = "( [$output]($style))"
style       = "fg:#0369a1"
description = "Anthropic rolling 5h usage limit"

# Claude model display name (e.g. "Opus 4.7"); stashed by cship.py wrapper from statusLine JSON.
[custom.model]
command     = "__COCKPIT_STARSHIP__ model"
when        = "true"
format      = "( [$output]($style))"
style       = "fg:#1f2937"
description = "Claude model display name"

# Permission mode (plan / accept-edits / bypass). Hidden when mode == default.
[custom.permission_mode]
command     = "__COCKPIT_STARSHIP__ permission-mode"
when        = "true"
format      = "( [$output]($style))"
style       = "bold fg:#b45309"
description = "Claude Code permission mode"

# Current branch + ahead/dirty markers (e.g. "khivi/feature ↑3 ●2"). Empty outside a git repo.
[custom.branch_pill]
command     = "__COCKPIT_STARSHIP__ branch-pill"
when        = "true"
format      = "( [$output]($style))"
style       = "fg:#475569"
description = "Git branch + ahead-of-origin + dirty file count"

# Relative age of HEAD commit (e.g. "⊙ 5m"). Hidden when older than 24h.
[custom.commit_age]
command     = "__COCKPIT_STARSHIP__ commit-age"
when        = "true"
format      = "( [$output]($style))"
style       = "fg:#475569"
description = "Relative age of the HEAD commit"

# Linear ticket extracted from current branch (e.g. "PRO-123"). Hidden if branch has none.
[custom.linear]
command     = "__COCKPIT_STARSHIP__ linear"
when        = "true"
format      = "( [$output]($style))"
style       = "bold fg:#6d28d9"
description = "Linear ticket ID from git branch"

# PR state for current branch: OPEN | DRAFT | MERGED | CLOSED | APPROVED | CHANGES_REQUESTED.
# Cached 60s. Hidden if no PR.
[custom.pr_state]
command     = "__COCKPIT_STARSHIP__ pr-state"
when        = "true"
format      = "( [$output]($style))"
style       = "bold fg:#0369a1"
description = "GitHub PR state for current branch"

# PR number for current branch (e.g. "#27588"). Hidden if no PR.
[custom.pr_num]
command     = "__COCKPIT_STARSHIP__ pr-num"
when        = "true"
format      = "( [$output]($style))"
style       = "fg:#1f2937"
description = "GitHub PR number for current branch"

# CI status glyph for current branch's PR: ✓ pass | ✗ fail | • pending. Cached 60s.
[custom.pr_checks]
command     = "__COCKPIT_STARSHIP__ pr-checks"
when        = "true"
format      = "( [$output]($style))"
style       = "bold fg:#15803d"
description = "GitHub PR CI status for current branch"

# PR title for current branch — sits on line two alongside Linear + PR pills.
[custom.pr_title]
command     = "__COCKPIT_STARSHIP__ pr-title"
when        = "true"
format      = "( [$output]($style))"
style       = "italic fg:#1f2937"
description = "GitHub PR title for current branch"
