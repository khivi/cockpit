name: Version Bump

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/version-check.yml'
      - 'README.md'
      - '*.md'

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          # Get the merge commit message (last commit on main)
          msg=$(git log -1 --format=%B)

          # Check for conventional commit prefixes
          if echo "$msg" | grep -q "^feat"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$msg" | grep -q "^fix"; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          elif echo "$msg" | grep -q "^break\|^BREAK"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          else
            # Default to patch for any other commits
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: semver
        run: |
          version=$(jq -r .version ./.claude-plugin/plugin.json)
          IFS='.' read -r major minor patch <<< "$version"

          case "${{ steps.bump.outputs.type }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_version="$major.$minor.$patch"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "Bumping version: $version → $new_version"

      - name: Update plugin.json
        run: |
          jq '.version = "${{ steps.semver.outputs.version }}"' ./.claude-plugin/plugin.json > tmp.json
          mv tmp.json ./.claude-plugin/plugin.json

      - name: Create version bump commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./.claude-plugin/plugin.json
          git commit -m "chore: bump version to ${{ steps.semver.outputs.version }}"
          git push
