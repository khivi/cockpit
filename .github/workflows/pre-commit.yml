name: pre-commit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Seed .relint.yml (gitignored locally; CI uses the example as a stub)
        run: |
          if [ ! -f .relint.yml ] && [ -f .relint.yml.example ]; then
            cp .relint.yml.example .relint.yml
          fi

      - uses: pre-commit/action@v3.0.1
        env:
          # gitleaks wants a full history to walk; checkout above sets it up.
          SKIP: ""
