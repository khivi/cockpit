name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# no-commit-to-branch is a local-dev guard against committing straight to
# main/master. On a push-to-main CI run the runner checks out main directly, so
# the hook fails on every run (pull_request runs sit on a detached HEAD and
# pass). It runs in both pre-commit steps below — the default-stage
# pre-commit/action and the explicit pre-push invocation — so skip it
# workflow-wide. SKIP is honoured by both `pre-commit/action` and bare
# `pre-commit run`.
env:
  SKIP: "no-commit-to-branch,version-bump-pre-push"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
          ignore-nothing-to-cache: true

      - name: Prime uv cache via uv sync
        run: uv sync --quiet

      - uses: pre-commit/action@v3.0.1
        env:
          PRE_COMMIT_USE_UV: "1"

      - name: Run pre-push stage hooks (pytest)
        run: pre-commit run --all-files --hook-stage pre-push
        env:
          PRE_COMMIT_USE_UV: "1"

  ci:
    needs: [pre-commit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on upstream jobs
        env:
          PRE_COMMIT_RESULT: ${{ needs.pre-commit.result }}
        run: |
          echo "pre-commit=$PRE_COMMIT_RESULT"
          if [ "$PRE_COMMIT_RESULT" != "success" ]; then
            echo "pre-commit did not succeed"; exit 1
          fi
