repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.20.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-json
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: check-toml
      - id: debug-statements
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        exclude: ^\.envrc$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ['--fix']
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: ['--config', '.markdownlint.yaml']

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: ['--config', '.codespellrc']

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject

  - repo: local
    hooks:
      - id: version-bump-pre-push
        name: Bump version on pre-push
        entry: python .githooks/version-bump.py
        language: python
        additional_dependencies: [semver==3.0.2]
        stages: [pre-push]
        always_run: true
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: pytest
        language: python
        additional_dependencies: [pytest==9.0.3]
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: mypy
        name: mypy type check
        entry: mypy
        language: python
        additional_dependencies: [mypy==2.1.0, pytest==9.0.3]
        args: ['scripts/', 'tests/']
        types: [python]
        pass_filenames: false
        stages: [pre-push]
